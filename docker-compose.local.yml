services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    container_name: trafficjam-db
    environment:
      POSTGRES_DB: trafficjam
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - trafficjam_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trafficjam"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    build:
      context: .
      dockerfile: docker/Dockerfile.nats
    container_name: trafficjam-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - trafficjam_nats_data:/data/jetstream

  map-data:
    build:
      context: .
      dockerfile: docker/Dockerfile.map-data
    container_name: trafficjam-map-data
    environment:
      DATABASE_URL: "${DATABASE_URL}"
    ports:
      - "8000:8000"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.be
    container_name: trafficjam-be
    environment:
      DATABASE_URL: "postgresql+asyncpg://admin:admin@db:5432/trafficjam"
      NATS_URL: "nats://nats:4222"
      SIMENGINE_URL: "http://simengine:8080"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy

  simengine:
    build:
      context: .
      dockerfile: docker/Dockerfile.simengine
    container_name: trafficjam-simengine
    environment:
      NATS_URL: "nats://nats:4222"
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.fe
    container_name: trafficjam-fe
    env_file:
      - trafficjam-fe/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - map-data

volumes:
  trafficjam_db_data:
  trafficjam_nats_data:
